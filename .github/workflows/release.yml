name: Release Desktop App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Determine tag and version
        id: meta
        run: |
          VERSION=$(jq -r .version client/src-tauri/tauri.conf.json)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${VERSION}"
            git tag "$TAG" 2>/dev/null || true
            git push origin "$TAG" 2>/dev/null || true
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          gh release view "$TAG" > /dev/null 2>&1 || \
            gh release create "$TAG" \
              --draft \
              --title "The Wired $TAG" \
              --notes "See the assets below to download and install this version."

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
            arch_suffix: "aarch64"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
            arch_suffix: "x64"
          - platform: windows-latest
            args: ""
            rust_targets: ""
            arch_suffix: "x64"
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            arch_suffix: "amd64"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: client
        run: pnpm tauri build ${{ matrix.args }}

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          ARCH="${{ matrix.arch_suffix }}"
          BUNDLE_DIR="client/src-tauri/target/${{ matrix.rust_targets }}/release/bundle"

          echo "=== Bundle contents ==="
          find "$BUNDLE_DIR" -type f 2>/dev/null

          UPLOAD_DIR=$(mktemp -d)

          # DMGs already include arch in the name (e.g. The Wired_0.1.0_aarch64.dmg)
          find "$BUNDLE_DIR/dmg" -name "*.dmg" -type f -exec cp {} "$UPLOAD_DIR/" \;

          # .app.tar.gz and .sig do NOT include arch — add it
          for f in "$BUNDLE_DIR"/macos/*.app.tar.gz; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .app.tar.gz)
            cp "$f" "$UPLOAD_DIR/${base}_${ARCH}.app.tar.gz"
          done
          for f in "$BUNDLE_DIR"/macos/*.app.tar.gz.sig; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .app.tar.gz.sig)
            cp "$f" "$UPLOAD_DIR/${base}_${ARCH}.app.tar.gz.sig"
          done

          echo "=== Uploading ==="
          ls -la "$UPLOAD_DIR/"
          for f in "$UPLOAD_DIR"/*; do
            [ -f "$f" ] || continue
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --clobber || true
          done

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          BUNDLE_DIR="client/src-tauri/target/release/bundle"

          echo "=== Bundle contents ==="
          find "$BUNDLE_DIR" -type f 2>/dev/null

          # Windows artifacts already include arch in the name
          echo "=== Uploading ==="
          find "$BUNDLE_DIR" -type f \( \
            -name "*.exe" -o -name "*.msi" -o \
            -name "*.nsis.zip" -o -name "*.sig" \
          \) -print0 | while IFS= read -r -d '' f; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --clobber || true
          done

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          BUNDLE_DIR="client/src-tauri/target/release/bundle"

          echo "=== Bundle contents ==="
          find "$BUNDLE_DIR" -type f 2>/dev/null

          echo "=== Uploading ==="
          find "$BUNDLE_DIR" -type f \( \
            -name "*.AppImage" -o -name "*.deb" -o \
            -name "*.AppImage.tar.gz" -o -name "*.sig" \
          \) -print0 | while IFS= read -r -d '' f; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --clobber || true
          done

  updater-json:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          TAG="${{ needs.create-release.outputs.tag }}"

          # List all release assets
          echo "=== Release assets ==="
          gh release view "$TAG" --json assets --jq '.assets[].name'

          # Download all .sig files from the release
          mkdir -p sigs
          gh release download "$TAG" --pattern "*.sig" --dir sigs || true
          echo "=== Downloaded sig files ==="
          ls -la sigs/ 2>/dev/null || echo "(none)"

          read_sig() {
            for f in sigs/*"$1"*; do
              if [ -f "$f" ]; then
                cat "$f"
                return
              fi
            done
            echo ""
          }

          MAC_AARCH64_SIG=$(read_sig "aarch64.app.tar.gz.sig")
          MAC_X64_SIG=$(read_sig "x64.app.tar.gz.sig")
          WIN_SIG=$(read_sig "x64-setup.exe.sig")
          LINUX_SIG=$(read_sig "AppImage.sig")

          # Build download URLs from actual asset names on the release
          # (GitHub replaces spaces with dots in asset names)
          get_asset_url() {
            local pattern="$1"
            local name
            name=$(gh release view "$TAG" --json assets --jq ".assets[].name" | grep "$pattern" | head -1)
            if [ -n "$name" ]; then
              echo "https://github.com/${{ github.repository }}/releases/download/${TAG}/${name}"
            else
              echo ""
            fi
          }

          MAC_ARM_URL=$(get_asset_url "_aarch64\.app\.tar\.gz$")
          MAC_X64_URL=$(get_asset_url "_x64\.app\.tar\.gz$")
          WIN_URL=$(get_asset_url "x64-setup\.exe$")
          LINUX_URL=$(get_asset_url "\.AppImage$")

          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the assets below to download and install this version." \
            --arg date "$DATE" \
            --arg mac_arm_sig "$MAC_AARCH64_SIG" \
            --arg mac_arm_url "$MAC_ARM_URL" \
            --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg mac_x64_url "$MAC_X64_URL" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "$WIN_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$LINUX_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url },
                "darwin-x86_64": { signature: $mac_x64_sig, url: $mac_x64_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url }
              }
            }' > latest.json

          echo "=== Generated latest.json ==="
          cat latest.json

          # Verify signatures are present
          MISSING=""
          [ -z "$MAC_AARCH64_SIG" ] && MISSING="$MISSING darwin-aarch64"
          [ -z "$MAC_X64_SIG" ] && MISSING="$MISSING darwin-x86_64"
          [ -z "$WIN_SIG" ] && MISSING="$MISSING windows-x86_64"
          [ -z "$LINUX_SIG" ] && MISSING="$MISSING linux-x86_64"
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing signatures for:$MISSING"
          fi

          gh release upload "$TAG" latest.json --clobber
