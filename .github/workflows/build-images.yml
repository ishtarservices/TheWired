name: Build & Push Docker Images

on:
  # Only build images after tests pass
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  changes:
    # Skip image builds if tests failed (workflow_run fires on both success and failure)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      gateway: ${{ steps.filter.outputs.gateway }}
      relay: ${{ steps.filter.outputs.relay }}
      landing: ${{ steps.filter.outputs.landing }}
      proxy: ${{ steps.filter.outputs.proxy }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0  # Full history so we can diff against last successful build

      - name: Detect changed paths
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Diff against the last successful build, not just HEAD~1.
          # This catches changes from prior commits whose tests failed.
          LAST_BUILD_SHA=$(gh run list \
            --workflow="Build & Push Docker Images" \
            --status=success \
            --json headSha \
            --jq '.[0].headSha' 2>/dev/null || echo "")

          if [ -z "$LAST_BUILD_SHA" ] || ! git cat-file -e "$LAST_BUILD_SHA" 2>/dev/null; then
            echo "No prior successful build found — building all images"
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "gateway=true" >> "$GITHUB_OUTPUT"
            echo "relay=true" >> "$GITHUB_OUTPUT"
            echo "landing=true" >> "$GITHUB_OUTPUT"
            echo "proxy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Diffing HEAD against last successful build: $LAST_BUILD_SHA"
          CHANGED=$(git diff --name-only "$LAST_BUILD_SHA" HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          check() { echo "$CHANGED" | grep -qE "$1" && echo true || echo false; }

          echo "backend=$(check '^(services/backend/|packages/shared-types/|pnpm-lock\.yaml$|tsconfig\.base\.json$)')" >> "$GITHUB_OUTPUT"
          echo "gateway=$(check '^services/gateway/')" >> "$GITHUB_OUTPUT"
          echo "relay=$(check '^services/relay/')" >> "$GITHUB_OUTPUT"
          echo "landing=$(check '^(services/landing/|pnpm-lock\.yaml$|tsconfig\.base\.json$)')" >> "$GITHUB_OUTPUT"
          echo "proxy=$(check '^services/proxy/')" >> "$GITHUB_OUTPUT"

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/ishtarservices/thewired-backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/ishtarservices/thewired-gateway
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: services/gateway
          file: services/gateway/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  relay:
    needs: changes
    if: needs.changes.outputs.relay == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/ishtarservices/thewired-relay
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: services/relay
          file: services/relay/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  landing:
    needs: changes
    if: needs.changes.outputs.landing == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/ishtarservices/thewired-landing
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/landing/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  proxy:
    needs: changes
    if: needs.changes.outputs.proxy == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/ishtarservices/thewired-proxy
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: services/proxy
          file: services/proxy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
