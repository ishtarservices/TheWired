name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Client Tests (Vitest) ───────────────────────
  client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run client tests
        run: pnpm test:client

      - name: Run client tests with coverage
        if: github.event_name == 'pull_request'
        run: pnpm test:client:coverage

  # ── Gateway Tests (Go) ─────────────────────────
  gateway:
    name: Gateway Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/gateway/go.sum

      - name: Run gateway tests
        working-directory: services/gateway
        run: go test ./... -v -count=1

  # ── Relay Tests (Rust) ─────────────────────────
  relay:
    name: Relay Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/relay

      - name: Run relay tests
        working-directory: services/relay
        run: cargo test

  # ── Backend Tests (Vitest + PostgreSQL) ─────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: thewired
          POSTGRES_PASSWORD: thewired
          POSTGRES_DB: thewired_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create DB schemas
        run: |
          PGPASSWORD=thewired psql -h localhost -U thewired -d thewired_test -c "CREATE SCHEMA IF NOT EXISTS app; CREATE SCHEMA IF NOT EXISTS relay;"

      - name: Run backend tests
        run: pnpm test:backend
        env:
          DATABASE_URL: postgres://thewired:thewired@localhost:5432/thewired_test
          TEST_DATABASE_URL: postgres://thewired:thewired@localhost:5432/thewired_test
          REDIS_URL: redis://localhost:6380/1
          NODE_ENV: test

  # ── Typecheck ──────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
