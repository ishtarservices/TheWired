networks:
  frontend:
  backend:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thewired}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-thewired}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thewired}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m

  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY in .env}
      MEILI_ENV: production
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m

  relay:
    image: ghcr.io/ishtarservices/thewired-relay:latest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-thewired}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-thewired}
      RELAY_PORT: 7777
      RELAY_NAME: ${RELAY_NAME:-The Wired Relay}
      RELAY_SECRET_KEY: ${RELAY_SECRET_KEY:?Set RELAY_SECRET_KEY in .env}
      RUST_ENV: production
      RUST_LOG: ${RUST_LOG:-info,thewired_relay=info}
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7777/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    image: ghcr.io/ishtarservices/thewired-backend:latest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-thewired}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-thewired}
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILI_MASTER_KEY:?err}
      RELAY_URL: ws://relay:7777
      PORT: 3002
      NODE_ENV: production
      LOG_LEVEL: info
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://thewired.app,tauri://localhost,http://localhost}
      PUBLIC_URL: ${PUBLIC_URL:-https://api.thewired.app}
      ADMIN_PUBKEYS: ${ADMIN_PUBKEYS:-}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      GIF_API_KEY: ${GIF_API_KEY:-}
      BLOB_DIR: /app/blobs
      MAX_BLOB_SIZE: ${MAX_BLOB_SIZE:-104857600}
      # Transcoding pipeline — both flags on by default. Roll back by setting
      # either to "false" in .env and redeploying; the client falls back to the
      # original blob URL when HLS variants are missing.
      TRANSCODE_ENQUEUE: ${TRANSCODE_ENQUEUE:-true}
      TRANSCODE_WORKER: ${TRANSCODE_WORKER:-true}
      # Default 1 so one vCPU stays free for Fastify under steady load.
      # Bump to 2 only during deliberate backfill windows (and watch CPU credits).
      TRANSCODE_CONCURRENCY: ${TRANSCODE_CONCURRENCY:-1}
    volumes:
      - blobdata:/app/blobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      relay:
        condition: service_started
      meilisearch:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1536m

  gateway:
    image: ghcr.io/ishtarservices/thewired-gateway:latest
    environment:
      GATEWAY_PORT: 9080
      BACKEND_URL: http://backend:3002
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://thewired.app,tauri://localhost,http://localhost}
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 256m

  livekit:
    image: livekit/livekit-server:latest
    environment:
      LIVEKIT_KEYS: "devkey: ${LIVEKIT_API_SECRET:-secret}"
      LIVEKIT_LOG_LEVEL: info
    command: --bind 0.0.0.0 --node-ip=${LIVEKIT_NODE_IP:-127.0.0.1}
    ports:
      # UDP port must be exposed to host for WebRTC
      - "7882:7882/udp"
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m

  landing:
    image: ghcr.io/ishtarservices/thewired-landing:latest
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 64m

  proxy:
    image: ghcr.io/ishtarservices/thewired-proxy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gateway:
        condition: service_healthy
      landing:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend

volumes:
  pgdata:
  meilidata:
  redisdata:
  blobdata:
  caddy_data:
  caddy_config:
