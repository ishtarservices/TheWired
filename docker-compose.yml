networks:
  frontend:
  backend:

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thewired}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-thewired}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thewired}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "${MEILI_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY in .env}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - backend

  relay:
    build:
      context: ./services/relay
      dockerfile: Dockerfile
    ports:
      - "${RELAY_PORT:-7777}:7777"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-thewired}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-thewired}
      RELAY_PORT: 7777
      RELAY_NAME: ${RELAY_NAME:-The Wired Relay}
      RELAY_SECRET_KEY: ${RELAY_SECRET_KEY:-}
      RUST_ENV: ${RUST_ENV:-development}
      RUST_LOG: ${RUST_LOG:-info,thewired_relay=debug}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7777/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - backend

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-3002}:3002"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-thewired}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-thewired}
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILI_MASTER_KEY:?err}
      RELAY_URL: ws://relay:7777
      PORT: 3002
      NODE_ENV: ${NODE_ENV:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:9080}
      ADMIN_PUBKEYS: ${ADMIN_PUBKEYS:-}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      GIF_API_KEY: ${GIF_API_KEY:-}
      BLOB_DIR: /app/blobs
      MAX_BLOB_SIZE: ${MAX_BLOB_SIZE:-104857600}
    volumes:
      - blobdata:/app/blobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      relay:
        condition: service_started
      meilisearch:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-9080}:9080"
    environment:
      GATEWAY_PORT: 9080
      BACKEND_URL: http://backend:3002
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # NOTE: Docker Desktop on macOS has known UDP port-forwarding issues that
  # prevent LiveKit media from working reliably. For Mac development, run
  # LiveKit natively instead of in Docker:
  #   brew install livekit
  #   livekit-server --dev
  # Then comment out this service or stop it with `docker stop <container>`.
  #
  # LIVEKIT_NODE_IP defaults to the host's LAN IP for Linux hosts where
  # Docker UDP works. On Mac, set it to your LAN IP (e.g. 192.168.1.x) only
  # if you absolutely must keep LiveKit in Docker.
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "${LIVEKIT_PORT:-7880}:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: ${LIVEKIT_API_SECRET:-secret}"
      LIVEKIT_LOG_LEVEL: info
    command: --dev --bind 0.0.0.0 ${LIVEKIT_NODE_IP:+--node-ip=${LIVEKIT_NODE_IP}}
    restart: unless-stopped
    networks:
      - backend

  landing:
    build:
      context: .
      dockerfile: services/landing/Dockerfile
    ports:
      - "${LANDING_PORT:-8080}:8080"
    networks:
      - frontend

  proxy:
    build:
      context: ./services/proxy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gateway:
        condition: service_healthy
      landing:
        condition: service_started
    restart: unless-stopped
    networks:
      - frontend
      - backend

volumes:
  pgdata:
  meilidata:
  redisdata:
  blobdata:
  caddy_data:
  caddy_config:
